<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480" font-family="Segoe UI, Roboto, Arial, sans-serif">

  <!-- Background -->
  <rect width="860" height="480" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#202124">Login System — Architecture</text>

  <!-- GCP boundary -->
  <rect x="180" y="60" width="640" height="380" rx="12" fill="none" stroke="#4285F4" stroke-width="2" stroke-dasharray="8,4"/>
  <rect x="200" y="52" width="100" height="22" fill="#f8f9fa"/>
  <text x="250" y="67" text-anchor="middle" font-size="13" fill="#4285F4" font-weight="bold">Google Cloud</text>

  <!-- ===== Artifact Registry ===== -->
  <rect x="580" y="80" width="170" height="60" rx="8" fill="#34A853" opacity="0.12" stroke="#34A853" stroke-width="1.5"/>
  <text x="665" y="106" text-anchor="middle" font-size="13" fill="#1e6e37" font-weight="bold">Artifact Registry</text>
  <text x="665" y="124" text-anchor="middle" font-size="11" fill="#1e6e37">login-repo (Docker)</text>

  <!-- ===== Cloud Build ===== -->
  <rect x="580" y="180" width="170" height="60" rx="8" fill="#FF6D00" opacity="0.12" stroke="#FF6D00" stroke-width="1.5"/>
  <text x="665" y="206" text-anchor="middle" font-size="13" fill="#b34700" font-weight="bold">Cloud Build</text>
  <text x="665" y="224" text-anchor="middle" font-size="11" fill="#b34700">cloudbuild.yaml</text>

  <!-- Cloud Build → Artifact Registry -->
  <line x1="665" y1="180" x2="665" y2="140" stroke="#FF6D00" stroke-width="1.5"/>
  <polygon points="661,143 665,133 669,143" fill="#FF6D00"/>
  <text x="682" y="163" font-size="10" fill="#FF6D00">push image</text>

  <!-- ===== Cloud Run: Frontend ===== -->
  <rect x="200" y="130" width="180" height="70" rx="8" fill="#4285F4" opacity="0.12" stroke="#4285F4" stroke-width="1.5"/>
  <text x="290" y="158" text-anchor="middle" font-size="13" fill="#1a56b0" font-weight="bold">Cloud Run</text>
  <text x="290" y="176" text-anchor="middle" font-size="12" fill="#1a56b0">login-frontend</text>
  <text x="290" y="192" text-anchor="middle" font-size="10" fill="#1a56b0">Flask · python main.py</text>

  <!-- ===== Cloud Run: API ===== -->
  <rect x="200" y="270" width="180" height="70" rx="8" fill="#4285F4" opacity="0.12" stroke="#4285F4" stroke-width="1.5"/>
  <text x="290" y="298" text-anchor="middle" font-size="13" fill="#1a56b0" font-weight="bold">Cloud Run</text>
  <text x="290" y="316" text-anchor="middle" font-size="12" fill="#1a56b0">login-api</text>
  <text x="290" y="332" text-anchor="middle" font-size="10" fill="#1a56b0">Flask · POST /login</text>

  <!-- ===== Cloud SQL ===== -->
  <rect x="200" y="390" width="180" height="38" rx="8" fill="#EA4335" opacity="0.12" stroke="#EA4335" stroke-width="1.5"/>
  <text x="290" y="410" text-anchor="middle" font-size="13" fill="#a50e0e" font-weight="bold">Cloud SQL</text>
  <text x="290" y="424" text-anchor="middle" font-size="11" fill="#a50e0e">PostgreSQL 15 · login-db</text>

  <!-- ===== USER ===== -->
  <circle cx="80" cy="165" r="28" fill="#e8eaed" stroke="#5f6368" stroke-width="1.5"/>
  <text x="80" y="159" text-anchor="middle" font-size="22">👤</text>
  <text x="80" y="180" text-anchor="middle" font-size="12" fill="#5f6368">User</text>
  <text x="80" y="194" text-anchor="middle" font-size="10" fill="#5f6368">Browser</text>

  <!-- User → Frontend -->
  <line x1="108" y1="165" x2="200" y2="165" stroke="#5f6368" stroke-width="1.5"/>
  <polygon points="197,161 207,165 197,169" fill="#5f6368"/>
  <text x="154" y="158" text-anchor="middle" font-size="10" fill="#5f6368">HTTPS</text>

  <!-- Frontend → API -->
  <line x1="290" y1="200" x2="290" y2="270" stroke="#4285F4" stroke-width="1.5"/>
  <polygon points="286,267 290,277 294,267" fill="#4285F4"/>
  <text x="315" y="238" font-size="10" fill="#4285F4">POST /login</text>

  <!-- API → Cloud SQL -->
  <line x1="290" y1="340" x2="290" y2="390" stroke="#EA4335" stroke-width="1.5"/>
  <polygon points="286,387 290,397 294,387" fill="#EA4335"/>
  <text x="298" y="368" font-size="10" fill="#EA4335">Unix socket</text>

  <!-- Cloud Build → Frontend -->
  <path d="M580,200 Q450,200 450,165 Q450,165 380,165" fill="none" stroke="#FF6D00" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="383,161 373,165 383,169" fill="#FF6D00"/>

  <!-- Cloud Build → API -->
  <path d="M580,220 Q500,220 500,305 Q500,305 380,305" fill="none" stroke="#FF6D00" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="383,301 373,305 383,309" fill="#FF6D00"/>
  <text x="510" y="265" font-size="10" fill="#FF6D00">deploy</text>

  <!-- Legend -->
  <rect x="630" y="300" width="160" height="110" rx="8" fill="white" stroke="#dadce0" stroke-width="1"/>
  <text x="710" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#202124">Legend</text>
  <line x1="645" y1="338" x2="670" y2="338" stroke="#5f6368" stroke-width="1.5"/>
  <text x="678" y="342" font-size="11" fill="#5f6368">User request</text>
  <line x1="645" y1="358" x2="670" y2="358" stroke="#FF6D00" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="678" y="362" font-size="11" fill="#FF6D00">CI/CD deploy</text>
  <line x1="645" y1="378" x2="670" y2="378" stroke="#EA4335" stroke-width="1.5"/>
  <text x="678" y="382" font-size="11" fill="#EA4335">DB connection</text>
  <line x1="645" y1="398" x2="670" y2="398" stroke="#34A853" stroke-width="1.5"/>
  <text x="678" y="402" font-size="11" fill="#34A853">Image registry</text>

</svg>
