<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; margin-top: 100px; }
    form { display: flex; flex-direction: column; gap: 10px; width: 250px; }
    input { padding: 8px; font-size: 14px; }
    button { padding: 8px; background: #333; color: white; border: none; cursor: pointer; }
    .error { color: red; font-size: 13px; }
  </style>
</head>
<body>
  <form method="POST">
    <h2>Login</h2>
    <input type="text" name="username" placeholder="Usuario" required>
    <input type="password" name="password" placeholder="Contraseña" required>
    <button type="submit">Entrar</button>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <a href="/register" style="text-align:center; font-size:13px;">Crear cuenta</a>
  </form>
</body>
</html>
