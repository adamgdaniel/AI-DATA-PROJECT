<!DOCTYPE html>
<html>
<head>
  <title>AgroMonitor – Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-image: url('/icons/fondo_login_page.webp');
      background-repeat: no-repeat;
      background-position: center center;
      background-size: auto 100%;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.30);
      z-index: 0;
    }

    .branding, form {
      position: relative;
      z-index: 1;
    }

    .branding {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .branding img {
      width: 185px;
      height: 185px;
      object-fit: contain;
    }

    .branding h1 {
      font-size: 2.6rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 6px rgba(0,0,0,0.55);
      letter-spacing: 0.5px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 13px;
      width: 350px;
      background: rgba(255,255,255,0.88);
      padding: 35px 30px;
      border-radius: 13px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    input { padding: 10px; font-size: 18px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 11px; background: #2d6a2d; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 18px; }
    button:hover { background: #245224; }
    .error { color: red; font-size: 16px; }
    a { text-align: center; font-size: 16px; color: #2d6a2d; }
  </style>
</head>
<body>
  <div class="branding">
    <img src="/icons/logo_png.png" alt="AgroMonitor logo">
    <h1>AgroMonitor</h1>
  </div>

  <form method="POST">
    <input type="text" name="username" placeholder="Usuario" required>
    <input type="password" name="password" placeholder="Contraseña" required>
    <button type="submit">Entrar</button>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <a href="/register">Crear cuenta</a>
  </form>
</body>
</html>
