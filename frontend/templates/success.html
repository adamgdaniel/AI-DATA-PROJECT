<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroMonitor — Mis Parcelas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
    header {
      background: #2d6a4f; color: white;
      padding: 11px 17px;
      display: flex; justify-content: space-between; align-items: center;
    }
    header span { font-weight: bold; font-size: 17px; }
    header a {
      color: #b7e4c7; font-size: 14px; text-decoration: none;
      display: flex; align-items: center; gap: 5px;
    }
    header a img { height: 18px; width: 18px; object-fit: contain; flex-shrink: 0; }

    #container { display: flex; flex: 1; overflow: hidden; }
    #map { flex: 1; min-height: 0; }
    #sidebar {
      width: 300px; overflow-y: auto;
      border-left: 1px solid #ddd;
      padding: 16px; background: #f9f9f9;
      display: flex; flex-direction: column; gap: 16px;
    }

    #zoom-hint {
      font-size: 12px; color: #888; background: #fff3cd;
      border: 1px solid #ffc107; border-radius: 4px; padding: 8px;
    }

    /* --- Panel registro --- */
    #info-panel {
      background: white; border: 1px solid #ccc;
      border-radius: 6px; padding: 14px; display: none;
    }
    #info-panel h3 { color: #2d6a4f; margin-bottom: 10px; font-size: 14px; }
    .field { margin-bottom: 8px; font-size: 13px; }
    .field label { font-weight: bold; display: block; margin-bottom: 2px; }
    select {
      width: 100%; padding: 7px; margin-top: 4px;
      border-radius: 4px; border: 1px solid #ccc; font-size: 13px;
    }
    .btn {
      width: 100%; padding: 9px; margin-top: 10px;
      border-radius: 4px; border: none;
      background: #2d6a4f; color: white;
      cursor: pointer; font-size: 13px;
    }
    .btn:hover { background: #1b4332; }
    #msg { font-size: 12px; margin-top: 8px; min-height: 16px; }

    /* --- Panel detalle parcela propia --- */
    #detail-panel {
      background: white; border: 2px solid #2d6a4f;
      border-radius: 8px; padding: 14px; display: none;
    }
    .dp-header {
      display: flex; align-items: flex-start; gap: 10px;
      margin-bottom: 12px; padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    .dp-emoji { font-size: 34px; line-height: 1; }
    .dp-info { flex: 1; }
    .dp-info strong { display: block; color: #2d6a4f; font-size: 13px; margin-bottom: 2px; }
    .dp-info span { font-size: 12px; color: #666; }
    .dp-close {
      background: none; border: none; font-size: 20px;
      cursor: pointer; color: #aaa; padding: 0; line-height: 1;
    }
    .dp-close:hover { color: #333; }
    .dp-section { margin-bottom: 14px; }
    .dp-section h4 {
      font-size: 11px; color: #999; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 8px;
    }

    /* Weather widget */
    #dp-weather-cards {
      display: flex; gap: 5px; overflow-x: auto; padding-bottom: 4px;
    }
    .weather-card {
      min-width: 38px; flex-shrink: 0;
      background: #f8faff; border: 1px solid #d0e4f7;
      border-radius: 6px; padding: 6px 3px;
      text-align: center;
    }
    .wc-day { font-size: 10px; font-weight: bold; color: #555; }
    .wc-icon { font-size: 15px; margin: 3px 0; }
    .wc-max { font-size: 12px; font-weight: bold; color: #c0392b; }
    .wc-min { font-size: 11px; color: #2980b9; }
    .wc-precip { font-size: 9px; color: #2980b9; margin-top: 2px; min-height: 11px; }

    /* Acción buttons */
    .dp-actions { display: flex; gap: 8px; }
    .btn-accion {
      flex: 1; padding: 9px 4px;
      background: white; border: 1.5px solid #2d6a4f;
      border-radius: 6px; color: #2d6a4f;
      cursor: pointer; font-size: 12px; font-weight: bold;
    }
    .btn-accion:hover { background: #2d6a4f; color: white; }

    /* Sensor readings */
    .dp-reading {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid #eee; font-size: 13px;
    }
    .dp-reading:last-of-type { border-bottom: none; }
    .dp-reading-label { color: #888; }
    .dp-reading-val { font-weight: bold; color: #2d6a4f; }

    /* Lista parcelas */
    #mis-parcelas h3 { color: #333; font-size: 14px; margin-bottom: 10px; }
    .parcela-item {
      background: white; border: 1px solid #ddd;
      border-radius: 4px; padding: 10px; margin-bottom: 8px;
      font-size: 12px; cursor: pointer; transition: border-color 0.15s;
    }
    .parcela-item:hover { border-color: #2d6a4f; }
    .parcela-item strong { display: block; color: #2d6a4f; margin-bottom: 4px; }
    #empty-msg { font-size: 13px; color: #888; }

    .crop-marker { background: none !important; border: none !important; }
    .parcela-glow { filter: drop-shadow(0 0 6px #4ade80) drop-shadow(0 0 14px #4ade8088); }

    /* Sensor section */
    .dp-section h4 { display: flex; align-items: center; justify-content: space-between; }
    .btn-add-small {
      padding: 2px 8px; background: #2d6a4f; color: white;
      border: none; border-radius: 3px; cursor: pointer; font-size: 10px;
      font-weight: normal; text-transform: none; letter-spacing: 0;
    }
    .btn-add-small:hover { background: #1b4332; }

    .sensor-item {
      display: flex; align-items: center; gap: 6px;
      background: #f0f7f4; border: 1px solid #b7dcc8;
      border-radius: 4px; padding: 6px 8px; margin-bottom: 4px;
    }
    .sensor-item-info { flex: 1; min-width: 0; }
    .sensor-item-type { font-size: 11px; font-weight: bold; color: #2d6a4f; }
    .sensor-item-id { font-size: 10px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sensor-del { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 14px; line-height: 1; flex-shrink: 0; }
    .sensor-del:hover { color: #922b21; }

    #add-sensor-panel {
      border-top: 1px solid #eee; padding-top: 10px; margin-top: 8px;
    }
    .discover-item {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px;
    }
    .discover-item:last-child { border-bottom: none; }
    .discover-info { flex: 1; min-width: 0; }
    .discover-name { font-weight: bold; color: #333; }
    .discover-meta { font-size: 10px; color: #888; }
    .btn-add-row {
      padding: 3px 8px; background: #2d6a4f; color: white;
      border: none; border-radius: 3px; cursor: pointer; font-size: 11px; flex-shrink: 0;
    }
    .btn-add-row:hover { background: #1b4332; }
    .btn-cancel-small {
      padding: 5px 10px; margin-top: 8px;
      background: none; border: 1px solid #ccc;
      border-radius: 3px; cursor: pointer; font-size: 11px; color: #666;
    }
    .btn-cancel-small:hover { background: #f5f5f5; }

    .btn-eliminar-parcela {
      width: 100%; padding: 8px; margin-top: 4px;
      background: none; border: 1.5px solid #c0392b;
      border-radius: 6px; color: #c0392b;
      cursor: pointer; font-size: 12px; font-weight: bold;
    }
    .btn-eliminar-parcela:hover { background: #c0392b; color: white; }

    /* --- Móvil --- */
    @media (max-width: 768px) {
      body { height: auto; min-height: 100vh; }
      #container { flex-direction: column; overflow: visible; }
      #map { height: 55vh; flex: none; width: 100%; }
      #sidebar {
        width: 100%; border-left: none;
        border-top: 2px solid #2d6a4f;
        max-height: none; overflow-y: visible;
      }
      select, .btn { padding: 12px; font-size: 15px; }
      .field { font-size: 14px; }
      .parcela-item { padding: 12px; font-size: 13px; }
      .weather-card { min-width: 44px; }
    }
  </style>
  <link rel="stylesheet" href="/static/theme-override.css"/>
</head>
<body>
  <header>
    <span><span style="display:inline-flex;width:33px;height:40px;overflow:hidden;align-items:center;justify-content:center;vertical-align:middle;margin-right:8px;"><img src="/icons/logo_png.png" alt="" style="height:51px;width:auto;"></span> AgroMonitor</span>
    <div style="display:flex;gap:17px;align-items:center;">
      <a href="/invernadero"><span style="display:inline-flex;width:36px;height:36px;overflow:hidden;align-items:center;justify-content:center;flex-shrink:0;"><img src="/icons/logo_invernadero_boton.png" alt="" style="width:65px;height:65px;"></span>Invernaderos</a>
      <a href="/home-assistant"><img src="/icons/home_assistant_logo.png" alt="" style="height:36px;width:36px;">Home Assistant</a>
      <a href="/logout"><img src="/icons/logout_icon.png" alt="">Cerrar sesión</a>
    </div>
  </header>
  <div id="container">
    <div id="map"></div>
    <div id="sidebar">
      <div id="zoom-hint">
        Acércate al mapa (zoom &ge; 14) y haz clic sobre una parcela para seleccionarla.
      </div>

      <!-- Panel: registrar parcela no propia -->
      <div id="info-panel">
        <h3>Parcela seleccionada</h3>
        <div class="field"><label>Referencia SIGPAC</label><span id="f-ref">-</span></div>
        <div class="field"><label>Superficie</label><span id="f-sup">-</span> ha</div>
        <div class="field"><label>Uso SIGPAC</label><span id="f-uso">-</span></div>
        <div class="field">
          <label>Cultivo</label>
          <select id="f-cultivo" onchange="onCultivoChange()">
            <option value="">-- Seleccionar cultivo --</option>
            <option>Maiz</option>
            <option>Naranjo</option>
            <option>Mandarino</option>
            <option>Melocotonero</option>
            <option>Limonero</option>
          </select>
        </div>
        <div class="field" id="f-variedad-field" style="display:none;">
          <label>Variedad</label>
          <select id="f-variedad">
            <option value="">-- Seleccionar variedad --</option>
          </select>
        </div>
        <div class="field" id="f-edad-field" style="display:none;">
          <label>Edad del cultivo</label>
          <select id="f-edad">
            <option value="">-- Seleccionar edad --</option>
            <option value="0-5">0-5 años</option>
            <option value="5-10">5-10 años</option>
            <option value="10-15">10-15 años</option>
            <option value="+15">+15 años</option>
          </select>
        </div>
        <button class="btn" onclick="registrarParcela()">Registrar como mía</button>
        <div id="msg"></div>
      </div>

      <!-- Panel: detalle de parcela propia -->
      <div id="detail-panel">
        <div class="dp-header">
          <div class="dp-emoji" id="dp-icon">🌿</div>
          <div class="dp-info">
            <strong id="dp-id"></strong>
            <span id="dp-cultivo"></span> &middot; <span id="dp-sup"></span> ha
          </div>
          <button class="dp-close" onclick="cerrarDetalle()">✕</button>
        </div>

        <div class="dp-section">
          <h4>Previsión 7 días</h4>
          <div id="dp-weather-cards">
            <p style="font-size:12px;color:#aaa">Cargando...</p>
          </div>
        </div>

        <div class="dp-section">
          <h4>Acciones</h4>
          <div class="dp-actions">
            <button class="btn-accion" onclick="registrarAccion('riego')">💧 Regar</button>
            <button class="btn-accion" onclick="registrarAccion('abono')">🌱 Abonar</button>
            <button class="btn-accion" onclick="registrarAccion('poda')">✂️ Podar</button>
          </div>
        </div>

        <div class="dp-section">
          <h4>Sensores IoT <button class="btn-add-small" onclick="abrirPanelSensor()">+ Añadir</button></h4>
          <div id="dp-sensors-list">
            <p style="font-size:12px;color:#aaa">Cargando...</p>
          </div>
          <div id="add-sensor-panel" style="display:none;">
            <div class="field">
              <label style="font-size:12px;font-weight:bold;display:block;margin-bottom:2px;">Conexión Home Assistant</label>
              <select id="sensor-conn-sel" onchange="onConexionChange()" style="font-size:12px;">
                <option value="">-- Seleccionar conexión --</option>
              </select>
            </div>
            <div id="sensores-desc" style="display:none;margin-top:8px;">
              <p style="font-size:11px;color:#888;margin-bottom:4px;">Sensores disponibles:</p>
              <div id="sensores-desc-list"></div>
            </div>
            <button class="btn-cancel-small" onclick="cerrarPanelSensor()">Cancelar</button>
          </div>
        </div>

        <button class="btn-eliminar-parcela" onclick="eliminarParcela()">🗑 Eliminar esta parcela</button>
      </div>

      <!-- Lista de parcelas -->
      <div id="mis-parcelas">
        <h3>Mis parcelas</h3>
        <div id="empty-msg">Cargando...</div>
        <div id="lista-parcelas"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const CROP_COLORS = {
      'Maiz':         '#27ae60',
      'Naranjo':      '#e67e22',
      'Mandarino':    '#f39c12',
      'Melocotonero': '#e8987a',
      'Limonero':     '#f1c40f'
    };
    const CROP_IMGS = {
      'Maiz':         '/icons/corn.webp',
      'Naranjo':      '/icons/orange.webp',
      'Mandarino':    '/icons/Tangerine.webp',
      'Melocotonero': '/icons/peach.png',
      'Limonero':     '/icons/lemon.png'
    };
    const VARIETIES = {
      'Maiz':         ['Híbrida ciclo largo', 'Grano'],
      'Naranjo':      ['Navelate', 'Navelina', 'Valencia late'],
      'Mandarino':    ['Clemenules', 'Híbrido tardío'],
      'Melocotonero': ['Amarillo/Pavía', 'Nectarina', 'Paraguayo'],
      'Limonero':     ['Primofiori']
    };

    const map = L.map('map').setView([40.0, -3.7], 6);

    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics',
      maxZoom: 19
    }).addTo(map);

    L.tileLayer.wms('https://wms.mapama.gob.es/wms/wms.aspx', {
      layers: 'AU.Sigpac:recinto',
      format: 'image/png',
      transparent: true,
      version: '1.1.1',
      opacity: 0.6
    }).addTo(map);

    let selectedParcel = null;
    let selectionLayer = null;
    let misParcelasData = [];
    const misParcelasLayer = L.layerGroup().addTo(map);

    // IDs de parcelas propias para detectar clicks en el mapa
    const misParcelasIds = new Set();

    map.on('click', function(e) {
      if (map.getZoom() < 14) return;

      const params = new URLSearchParams({
        lat: e.latlng.lat,
        lng: e.latlng.lng,
        zoom: map.getZoom()
      });

      fetch('/sigpac-info?' + params)
        .then(r => r.json())
        .then(data => {
          if (!data.features || data.features.length === 0) {
            document.getElementById('info-panel').style.display = 'none';
            return;
          }
          const p = data.features[0].properties;
          const parcelaId = `${p.provincia}-${p.municipio}-${p.poligono}-${p.parcela}-${p.recinto}`;

          // Si es una parcela propia, mostrar detalle en vez de registro
          const propia = misParcelasData.find(mp => mp.parcela_id === parcelaId);
          if (selectionLayer) { selectionLayer.remove(); selectionLayer = null; }
          if (propia) {
            mostrarDetalleParcela(propia);
            return;
          }

          selectedParcel = {
            provincia:  p.provincia,  municipio:  p.municipio,
            agregado:   p.agregado ?? 0, zona: p.zona ?? 0,
            poligono:   p.poligono,   parcela:    p.parcela,
            recinto:    p.recinto,    superficie: p.superficie,
            lat: p.lat ?? e.latlng.lat, lng: p.lng ?? e.latlng.lng,
            geometria: p.geometry ?? null
          };

          if (p.geometry) {
            try {
              const glowOuter = L.geoJSON(p.geometry, {
                style: { color: '#4ade80', weight: 10, opacity: 0.18, fillColor: '#4ade80', fillOpacity: 0.12, className: 'parcela-glow' }
              });
              const glowInner = L.geoJSON(p.geometry, {
                style: { color: '#22c55e', weight: 2, opacity: 0.9, dashArray: '6,4', fillColor: '#86efac', fillOpacity: 0.28, className: 'parcela-glow' }
              });
              selectionLayer = L.layerGroup([glowOuter, glowInner]).addTo(map);
            } catch (err) {
              console.error("Error dibujando selección SIGPAC:", err, p.geometry);
            }
          }
          document.getElementById('f-ref').textContent = parcelaId;
          document.getElementById('f-sup').textContent = p.superficie ?? '-';
          document.getElementById('f-uso').textContent = p.uso_sigpac ?? '-';
          document.getElementById('msg').textContent = '';
          document.getElementById('f-cultivo').value = '';
          document.getElementById('f-variedad-field').style.display = 'none';
          document.getElementById('detail-panel').style.display = 'none';
          document.getElementById('info-panel').style.display = 'block';
          if (window.innerWidth <= 768) {
            document.getElementById('info-panel').scrollIntoView({ behavior: 'smooth' });
          }
        })
        .catch(() => {
          document.getElementById('msg').textContent = 'Error consultando SIGPAC.';
        });
    });

    function onCultivoChange() {
      const cultivo = document.getElementById('f-cultivo').value;
      const variedadField = document.getElementById('f-variedad-field');
      const variedadSel = document.getElementById('f-variedad');
      const edadField = document.getElementById('f-edad-field');
      if (!cultivo) {
        variedadField.style.display = 'none';
        edadField.style.display = 'none';
        return;
      }
      const vars = VARIETIES[cultivo] || [];
      variedadSel.innerHTML = '<option value="">-- Seleccionar variedad --</option>' +
        vars.map(v => `<option value="${v}">${v}</option>`).join('');
      variedadField.style.display = 'block';
      edadField.style.display = cultivo === 'Maiz' ? 'none' : 'block';
      document.getElementById('f-edad').value = '';
    }

    function registrarParcela() {
      const cultivo = document.getElementById('f-cultivo').value;
      const variedad = document.getElementById('f-variedad').value;
      const edad = cultivo !== 'Maiz' ? document.getElementById('f-edad').value : null;
      if (!cultivo) {
        document.getElementById('msg').textContent = 'Selecciona un cultivo primero.';
        return;
      }
      if (!variedad) {
        document.getElementById('msg').textContent = 'Selecciona una variedad.';
        return;
      }
      if (cultivo !== 'Maiz' && !edad) {
        document.getElementById('msg').textContent = 'Selecciona la edad del cultivo.';
        return;
      }
      fetch('/registrar-parcela', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ...selectedParcel, cultivo, variedad, edad_cultivo: edad })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          document.getElementById('msg').textContent = '✓ Parcela registrada.';
          document.getElementById('info-panel').style.display = 'none';
          if (selectionLayer) { selectionLayer.remove(); selectionLayer = null; }
          selectedParcel = null;
          cargarParcelas();
        } else {
          document.getElementById('msg').textContent = data.error || 'Error al registrar.';
        }
      })
      .catch(() => {
        document.getElementById('msg').textContent = 'Error de conexión.';
      });
    }

    function cargarParcelas() {
      fetch('/mis-parcelas')
        .then(r => r.json())
        .then(parcelas => {
          if (!Array.isArray(parcelas)) parcelas = [];
          misParcelasData = parcelas;
          misParcelasLayer.clearLayers();
          misParcelasIds.clear();

          const lista = document.getElementById('lista-parcelas');
          const emptyMsg = document.getElementById('empty-msg');

          if (parcelas.length === 0) {
            emptyMsg.textContent = 'Aún no tienes parcelas registradas.';
            lista.innerHTML = '';
            return;
          }

          emptyMsg.textContent = '';
          lista.innerHTML = parcelas.map(p => `
            <div class="parcela-item" onclick="focusParcela('${p.parcela_id}')">
              <strong>
                <img src="${CROP_IMGS[p.cultivo] || ''}" style="width:16px;height:16px;vertical-align:middle;object-fit:contain">
                ${p.parcela_id}
              </strong>
              ${p.cultivo}${p.variedad ? ' · ' + p.variedad : ''}${p.superficie ? ' · ' + p.superficie + ' ha' : ''}
            </div>
          `).join('');

          parcelas.forEach(p => {
            misParcelasIds.add(p.parcela_id);
            const color = CROP_COLORS[p.cultivo] || '#95a5a6';

            if (p.geometria) {
              try {
                const layer = L.geoJSON(p.geometria, {
                  style: { color, weight: 2.5, fillColor: color, fillOpacity: 0.35 }
                });
                layer.on('click', (e) => {
                  L.DomEvent.stopPropagation(e);
                  mostrarDetalleParcela(p);
                });
                layer.addTo(misParcelasLayer);
              } catch (err) {
                console.error("Error dibujando geometría de parcela:", err);
              }
            }

            if (p.lat && p.lng) {
              const cropIcon = L.divIcon({
                html: `<img src="${CROP_IMGS[p.cultivo] || ''}" style="width:24px;height:24px;object-fit:contain;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))">`,
                className: 'crop-marker',
                iconAnchor: [12, 12]
              });
              const marker = L.marker([p.lat, p.lng], { icon: cropIcon });
              marker.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                mostrarDetalleParcela(p);
              });
              marker.addTo(misParcelasLayer);
            }
          });
        })
        .catch(() => {
          document.getElementById('empty-msg').textContent = 'Error cargando parcelas.';
        });
    }

    function focusParcela(parcelaId) {
      const p = misParcelasData.find(mp => mp.parcela_id === parcelaId);
      if (!p) return;
      if (p.lat && p.lng) map.setView([p.lat, p.lng], 15);
      mostrarDetalleParcela(p);
    }

    function mostrarDetalleParcela(p) {
      currentParcela = p;
      document.getElementById('info-panel').style.display = 'none';
      document.getElementById('dp-icon').innerHTML = `<img src="${CROP_IMGS[p.cultivo] || ''}" style="width:34px;height:34px;object-fit:contain">`;
      document.getElementById('dp-id').textContent = p.parcela_id;
      document.getElementById('dp-cultivo').textContent = p.cultivo + (p.variedad ? ' · ' + p.variedad : '');
      document.getElementById('dp-sup').textContent = p.superficie ?? '-';
      document.getElementById('detail-panel').style.display = 'block';
      cerrarPanelSensor();
      if (p.id) cargarSensoresParcela(p.id);
      document.getElementById('dp-weather-cards').innerHTML =
        '<p style="font-size:12px;color:#aaa">Cargando previsión...</p>';

      fetch(`/tiempo-parcela?provincia=${p.provincia}&municipio=${p.municipio}`)
        .then(r => r.json())
        .then(renderizarTiempo)
        .catch(() => {
          document.getElementById('dp-weather-cards').innerHTML =
            '<p style="font-size:12px;color:#c00">No se pudo cargar la previsión.</p>';
        });

      if (window.innerWidth <= 768) {
        document.getElementById('detail-panel').scrollIntoView({ behavior: 'smooth' });
      }
    }

    function cerrarDetalle() {
      document.getElementById('detail-panel').style.display = 'none';
    }

    function weatherIcon(code) {
      const c = parseInt(code) || 0;
      if (c === 0)  return '🌤️';
      if (c <= 12)  return '☀️';
      if (c <= 14)  return '🌤️';
      if (c <= 17)  return '⛅';
      if (c <= 26)  return '☁️';
      if (c <= 36)  return '🌧️';
      if (c <= 46)  return '🌦️';
      if (c <= 64)  return '🌧️';
      if (c <= 74)  return '⛈️';
      return '❄️';
    }

    function renderizarTiempo(data) {
      const container = document.getElementById('dp-weather-cards');
      if (!Array.isArray(data) || data.length === 0) {
        container.innerHTML = '<p style="font-size:12px;color:#aaa">Sin datos.</p>';
        return;
      }
      const dias_pred = data[0]?.prediccion?.dia;
      if (!dias_pred || dias_pred.length === 0) {
        container.innerHTML = '<p style="font-size:12px;color:#aaa">Sin datos.</p>';
        return;
      }
      const DIAS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
      container.innerHTML = dias_pred.slice(0, 7).map(dia => {
        const fecha = new Date(dia.fecha);
        const label = DIAS[fecha.getDay()];
        const cielo = (dia.estadoCielo || []).find(e => e.periodo === '00-24')
                      || (dia.estadoCielo || [])[0] || {};
        const tmax  = dia.temperatura?.maxima ?? '-';
        const tmin  = dia.temperatura?.minima ?? '-';
        const prec  = ((dia.precipitacion || []).find(e => e.periodo === '00-24') || {}).value || '0';
        return `
          <div class="weather-card">
            <div class="wc-day">${label}</div>
            <div class="wc-icon">${weatherIcon(cielo.value)}</div>
            <div class="wc-max">${tmax}°</div>
            <div class="wc-min">${tmin}°</div>
            <div class="wc-precip">${parseFloat(prec) > 0 ? '💧' + prec : ''}</div>
          </div>`;
      }).join('');
    }

    function registrarAccion(tipo) {
      alert(`Acción "${tipo}" registrada (próximamente se guardará en la BD).`);
    }

    // ---- Sensor management ----
    const SENSOR_LABELS = {
      'soil_moisture':   'Humedad del suelo',
      'temperature':     'Temperatura',
      'ambient_humidity':'Hum. ambiental'
    };
    let currentParcela = null;

    function cargarSensoresParcela(parcelaUsuarioId) {
      const list = document.getElementById('dp-sensors-list');
      list.innerHTML = '<p style="font-size:12px;color:#aaa">Cargando...</p>';
      fetch(`/iot/mis-sensores?parcela_usuario_id=${parcelaUsuarioId}`)
        .then(r => r.json())
        .then(sensores => {
          if (!Array.isArray(sensores) || sensores.length === 0) {
            list.innerHTML = '<p style="font-size:12px;color:#aaa">Sin sensores asignados.</p>';
            return;
          }
          list.innerHTML = sensores.map(s => `
            <div class="sensor-item">
              <div class="sensor-item-info">
                <div class="sensor-item-type">${SENSOR_LABELS[s.sensor_type] || s.sensor_type}</div>
                <div class="sensor-item-id">${s.display_name || s.sensor_id}</div>
              </div>
              <button class="sensor-del" title="Eliminar sensor"
                onclick="eliminarSensor('${s.sensor_id.replace(/'/g,"\\'")}')">✕</button>
            </div>
          `).join('');
        })
        .catch(() => {
          list.innerHTML = '<p style="font-size:12px;color:#aaa">Sin sensores asignados.</p>';
        });
    }

    function abrirPanelSensor() {
      const panel = document.getElementById('add-sensor-panel');
      panel.style.display = 'block';
      document.getElementById('sensores-desc').style.display = 'none';
      const sel = document.getElementById('sensor-conn-sel');
      sel.innerHTML = '<option value="">Cargando conexiones...</option>';
      fetch('/mis-conexiones-ha')
        .then(r => r.json())
        .then(conns => {
          if (!Array.isArray(conns) || conns.length === 0) {
            sel.innerHTML = '<option value="">Sin conexiones HA configuradas</option>';
            return;
          }
          sel.innerHTML = '<option value="">-- Seleccionar conexión --</option>' +
            conns.map(c => `<option value="${c.connection_id}">${c.display_name || c.ha_url}</option>`).join('');
        })
        .catch(() => {
          sel.innerHTML = '<option value="">Error al cargar conexiones</option>';
        });
    }

    function cerrarPanelSensor() {
      document.getElementById('add-sensor-panel').style.display = 'none';
      document.getElementById('sensores-desc').style.display = 'none';
    }

    function onConexionChange() {
      const connectionId = document.getElementById('sensor-conn-sel').value;
      const descDiv = document.getElementById('sensores-desc');
      const list = document.getElementById('sensores-desc-list');
      if (!connectionId) { descDiv.style.display = 'none'; return; }
      descDiv.style.display = 'block';
      list.innerHTML = '<p style="font-size:11px;color:#aaa">Buscando sensores...</p>';
      fetch(`/iot/descubrir-sensores?connection_id=${connectionId}`)
        .then(r => r.json())
        .then(sensores => {
          if (!Array.isArray(sensores) || sensores.length === 0) {
            list.innerHTML = '<p style="font-size:11px;color:#888">No se encontraron sensores compatibles.</p>';
            return;
          }
          list.innerHTML = sensores.map(s => `
            <div class="discover-item">
              <div class="discover-info">
                <div class="discover-name">${s.display_name || s.sensor_id}</div>
                <div class="discover-meta">${SENSOR_LABELS[s.sensor_type] || s.sensor_type} · ${s.state} ${s.unit || ''}</div>
              </div>
              <button class="btn-add-row"
                onclick="añadirSensor('${s.sensor_id.replace(/'/g,"\\'")}','${s.sensor_type}','${(s.display_name||'').replace(/'/g,"\\'")}',${connectionId})">
                Añadir
              </button>
            </div>
          `).join('');
        })
        .catch(() => {
          list.innerHTML = '<p style="font-size:11px;color:#c00">Error al contactar con Home Assistant.</p>';
        });
    }

    function añadirSensor(sensorId, sensorType, displayName, connectionId) {
      if (!currentParcela || !currentParcela.id) return;
      fetch('/iot/registrar-sensor', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sensor_id: sensorId,
          sensor_type: sensorType,
          display_name: displayName || null,
          connection_id: connectionId,
          parcela_usuario_id: currentParcela.id
        })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          cerrarPanelSensor();
          cargarSensoresParcela(currentParcela.id);
        } else {
          alert(data.error || 'Error al registrar el sensor.');
        }
      })
      .catch(() => alert('Error de conexión.'));
    }

    function eliminarParcela() {
      if (!currentParcela || !currentParcela.id) return;
      if (!confirm(`¿Eliminar la parcela "${currentParcela.parcela_id}"? Esta acción no se puede deshacer.`)) return;
      fetch(`/eliminar-parcela/${currentParcela.id}`, { method: 'DELETE' })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            document.getElementById('detail-panel').style.display = 'none';
            currentParcela = null;
            cargarParcelas();
          } else {
            alert(data.error || 'Error al eliminar la parcela.');
          }
        })
        .catch(() => alert('Error de conexión.'));
    }

    function eliminarSensor(sensorId) {
      if (!confirm('¿Eliminar este sensor?')) return;
      fetch('/iot/eliminar-sensor', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sensor_id: sensorId })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success && currentParcela) cargarSensoresParcela(currentParcela.id);
        else alert(data.error || 'Error al eliminar el sensor.');
      })
      .catch(() => alert('Error de conexión.'));
    }

    cargarParcelas();
    setTimeout(() => map.invalidateSize(), 100);
  </script>
</body>
</html>
