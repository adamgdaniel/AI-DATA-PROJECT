{# Chat flotante con el agente IA — incluido en todas las páginas.
   Solo se renderiza para usuarios autenticados (ver context_processor en main.py). #}
{% if chat_enabled %}
<link rel="stylesheet" href="{{ url_for('static', filename='chat-widget.css') }}"/>

<button id="agro-chat-fab"
        class="agro-chat-fab"
        type="button"
        aria-label="Abrir chat con el asistente agrónomo"
        aria-expanded="false"
        aria-controls="agro-chat-panel">
  <svg class="agro-icon-chat" viewBox="0 0 24 24" aria-hidden="true">
    <rect x="5" y="7" width="14" height="11" rx="2"/>
    <circle cx="9" cy="12" r="1.2"/>
    <circle cx="15" cy="12" r="1.2"/>
    <path d="M9 15.5h6"/>
    <path d="M12 7V4"/>
    <circle cx="12" cy="3.5" r="1"/>
    <path d="M5 12H3M19 12h2"/>
  </svg>
  <svg class="agro-icon-close" viewBox="0 0 24 24" aria-hidden="true">
    <line x1="6" y1="6" x2="18" y2="18"/>
    <line x1="18" y1="6" x2="6" y2="18"/>
  </svg>
  <span class="agro-chat-fab__hint">Pregunta al asistente</span>
</button>

<div id="agro-chat-panel" class="agro-chat-panel" role="dialog" aria-labelledby="agro-chat-title">
  <header class="agro-chat-header">
    <div class="agro-chat-header__avatar" aria-hidden="true">🌾</div>
    <div class="agro-chat-header__info">
      <div class="agro-chat-header__title" id="agro-chat-title">Asistente Agrónomo</div>
      <div class="agro-chat-header__subtitle">En línea — listo para ayudarte</div>
    </div>
    <button id="agro-chat-close" class="agro-chat-header__close" type="button" aria-label="Cerrar chat">✕</button>
  </header>

  <div id="agro-chat-messages" class="agro-chat-messages" aria-live="polite"></div>

  <div class="agro-chat-footer">
    <textarea id="agro-chat-input"
              class="agro-chat-input"
              rows="1"
              placeholder="Pregunta sobre tus cultivos aquí..."
              aria-label="Escribe tu pregunta al asistente"></textarea>
    <button id="agro-chat-send" class="agro-chat-send" type="button" aria-label="Enviar mensaje">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script src="{{ url_for('static', filename='chat-widget.js') }}" defer></script>
{% endif %}
