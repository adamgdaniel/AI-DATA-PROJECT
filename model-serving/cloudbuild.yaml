steps:
  # Copia cultivos_referencia.json al contexto del build antes de construir la imagen
  - name: 'bash'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'mkdir -p model-serving/data && cp model-training/data/cultivos_referencia.json model-serving/data/cultivos_referencia.json'

  - name: 'gcr.io/cloud-builders/docker'
    dir: 'model-serving'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/model-serving-repo/model-serving:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/model-serving-repo/model-serving:$COMMIT_SHA'

  # Solo actualiza la imagen; Terraform gestiona el servicio
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'model-serving'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/model-serving-repo/model-serving:$COMMIT_SHA'
      - '--region=$_REGION'

substitutions:
  _REGION: europe-west1

options:
  logging: CLOUD_LOGGING_ONLY