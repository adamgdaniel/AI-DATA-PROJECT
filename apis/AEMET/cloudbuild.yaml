steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/aemet-repo/aemet-ingest:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/aemet-repo/aemet-ingest:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'jobs'
      - 'update'
      - 'aemet-ingest'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/aemet-repo/aemet-ingest:$COMMIT_SHA'
      - '--region=$_REGION'

substitutions:
  _REGION: europe-west1

options:
  logging: CLOUD_LOGGING_ONLY
