steps:
  - name: 'python:3.11'
    entrypoint: pip
    args: ['install', '-r', 'dataflow/requirements.txt', '--quiet']

  - name: 'python:3.11'
    entrypoint: python
    args:
      - dataflow/pipeline.py
      - --runner=DataflowRunner
      - --project=$PROJECT_ID
      - --region=europe-west1
      - --temp_location=gs://$PROJECT_ID-dataflow/temp
      - --staging_location=gs://$PROJECT_ID-dataflow/staging
      - --job_name=iot-sensor-pipeline
      - --streaming
      - --project_id=$PROJECT_ID
      - --subscription=sensor-readings-dataflow-sub
      - --bq_dataset=iot_data
      - --bq_table=sensor_aggregated
      - --instance_connection_name=$_INSTANCE_CONNECTION_NAME
      - --db_user=loginuser
      - --db_password=$_DB_PASSWORD
      - --db_name=logindb

substitutions:
  _INSTANCE_CONNECTION_NAME: 'project-7f8b4dee-2b72-40f2-941:europe-west1:login-db'
