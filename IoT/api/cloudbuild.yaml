steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'europe-west1-docker.pkg.dev/$PROJECT_ID/iot-repo/iot-api:latest', '.']
    dir: 'IoT/api'
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/$PROJECT_ID/iot-repo/iot-api:latest']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - iot-api
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/iot-repo/iot-api:latest
      - --region=europe-west1
      - --platform=managed
options:
  logging: CLOUD_LOGGING_ONLY
